<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>KADJI SMARTGAZ TRACKER - Administration Web</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f5f6fa; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; max-width: 500px; margin: 20px auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        button { color: white; border: none; padding: 12px 20px; margin: 8px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-vert { background-color: #2ecc71; }
        .btn-orange { background-color: #e67e22; }
        .btn-rouge { background-color: #e74c3c; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🔥 KADJI SMARTGAZ TRACKER</h1>
        <p>Interface d'administration et de simulation Cloud</p>
        
        <hr>
        
        <h3>🔧 Simulateur de Niveau de Gaz (Sans ESP32)</h3>
        <button class="btn-vert" onclick="simulerGaz(12.5, 100)">🟢 Bouteille Pleine (12.5 kg)</button>
        <button class="btn-orange" onclick="simulerGaz(6.5, 52)">🟠 Bouteille Moyenne (6.5 kg)</button>
        <button class="btn-rouge" onclick="simulerGaz(1.5, 12)">🔴 Niveau Critique (1.5 kg)</button>
    </div>

    <script>
    async function simulerGaz(poidsSimule, pourcentageSimule) {
        const URL_SERVEUR = "https://onrender.com";
        const CLE_API = "MonSecretCameroun2026";

        try {
            // Étape 1 : Simulation du point précédent pour l'IA
            await fetch(URL_SERVEUR, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-api-key': CLE_API },
                body: JSON.stringify({ poids: poidsSimule + 2.0, pourcentage: pourcentageSimule + 15, batterie: 3.3 })
            });

            // Étape 2 : Simulation du point actuel après 500ms
            setTimeout(async () => {
                const reponse = await fetch(URL_SERVEUR, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-api-key': CLE_API },
                    body: JSON.stringify({ poids: poidsSimule, pourcentage: pourcentageSimule, batterie: 3.3 })
                });

                if (reponse.ok) {
                    alert("✅ Données envoyées au Cloud ! Poids : " + poidsSimule + " kg");
                    
                    // Si niveau critique, l'ordinateur parle
                    if (poidsSimule < 2.0) {
                        let voix = new SpeechSynthesisUtterance("Attention. Le niveau de gaz de votre bouteille de 12,5 kg est critique. Veuillez procéder à la recharge.");
                        voix.lang = 'fr-FR';
                        window.speechSynthesis.speak(voix);
                    }
                } else {
                    alert("❌ Le serveur a rejeté la simulation. Statut : " + reponse.status);
                }
            }, 500);

        } catch (erreur) {
            alert("❌ Erreur réseau : impossible de joindre le serveur Render.");
            console.error(erreur);
        }
    }
    </script>
</body>
</html>
